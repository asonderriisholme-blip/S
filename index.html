<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kursusportal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; color: #333; }
    .box { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 28px; width: 100%; max-width: 480px; }
    .api-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .api-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; color: #333; outline: none; }
    .api-row input:focus { border-color: #888; }
    .api-row input::placeholder { color: #bbb; }
    .drop-zone { border: 1px dashed #ccc; border-radius: 4px; background: #fafafa; padding: 32px 16px; text-align: center; cursor: pointer; position: relative; margin-bottom: 14px; transition: background 0.15s; }
    .drop-zone:hover { background: #f0f0f0; }
    .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-zone.has-file { background: #f0fff4; border-color: #aaa; }
    .drop-text { font-size: 13px; color: #888; }
    .drop-name { font-size: 13px; color: #333; font-weight: 500; }
    .btn { width: 100%; padding: 10px; background: #333; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; transition: background 0.15s; }
    .btn:hover:not(:disabled) { background: #111; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .status { display: none; margin-top: 14px; font-size: 13px; color: #666; display: none; align-items: center; gap: 8px; }
    .spinner { width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: #333; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { display: none; margin-top: 12px; padding: 10px 14px; background: #fff0f0; border: 1px solid #f0a0a0; border-radius: 4px; font-size: 13px; color: #a00; }
    .result { display: none; margin-top: 16px; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; }
    .result-top { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f5f5f5; border-bottom: 1px solid #ddd; }
    .result-top span { font-size: 13px; color: #333; }
    .dl-btn { font-size: 12px; padding: 4px 10px; border: 1px solid #aaa; border-radius: 4px; background: white; cursor: pointer; color: #333; }
    .dl-btn:hover { background: #f0f0f0; }
    .result-body { padding: 16px; max-height: 400px; overflow-y: auto; }
    .q-block { margin-bottom: 16px; }
    .q-num { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .q-text { font-size: 13px; color: #555; margin-bottom: 6px; }
    .a-text { font-size: 13px; color: #111; line-height: 1.7; white-space: pre-wrap; }
    .divider { border: none; border-top: 1px solid #eee; margin: 14px 0; }
  </style>
</head>
<body>
<div class="box">
  <div class="api-row">
    <input type="password" id="api-key" placeholder="API-nøgle (sk-ant-...)" />
  </div>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/*,.pdf" />
    <div id="drop-default"><p class="drop-text">Klik eller træk fil hertil</p></div>
    <div id="drop-selected" style="display:none"><p class="drop-name" id="drop-name">—</p></div>
  </div>

  <button class="btn" id="solve-btn" disabled>Send</button>

  <div class="status" id="status">
    <div class="spinner"></div>
    <span id="status-text">Arbejder...</span>
  </div>

  <div class="error" id="error-box"></div>

  <div class="result" id="result-box">
    <div class="result-top">
      <span>Svar klar</span>
      <button class="dl-btn" id="dl-btn">Download PDF</button>
    </div>
    <div class="result-body" id="result-body"></div>
  </div>
</div>

<script>
  let currentFile = null;
  let parsedQA = [];

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const solveBtn = document.getElementById('solve-btn');
  const statusEl = document.getElementById('status');
  const statusText = document.getElementById('status-text');
  const resultBox = document.getElementById('result-box');
  const resultBody = document.getElementById('result-body');
  const errorBox = document.getElementById('error-box');
  const dlBtn = document.getElementById('dl-btn');

  function setFile(file) {
    currentFile = file;
    document.getElementById('drop-default').style.display = 'none';
    document.getElementById('drop-selected').style.display = 'block';
    document.getElementById('drop-name').textContent = file.name;
    dropZone.classList.add('has-file');
    solveBtn.disabled = false;
    resultBox.style.display = 'none';
    errorBox.style.display = 'none';
  }

  fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); });
  dropZone.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });

  solveBtn.addEventListener('click', async () => {
    const apiKey = document.getElementById('api-key').value.trim();
    if (!apiKey) { showError('Indsæt din API-nøgle.'); return; }
    if (!currentFile) return;

    solveBtn.disabled = true;
    statusEl.style.display = 'flex';
    resultBox.style.display = 'none';
    errorBox.style.display = 'none';
    statusText.textContent = 'Læser opgaven...';

    try {
      const base64Data = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = () => rej(new Error('Kunne ikke læse filen'));
        r.readAsDataURL(currentFile);
      });

      const isPDF = currentFile.name.toLowerCase().endsWith('.pdf');
      const mimeType = isPDF ? 'application/pdf' : (currentFile.type || 'image/png');
      const contentBlock = isPDF
        ? { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64Data } }
        : { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64Data } };

      statusText.textContent = 'Løser opgaven...';

      const response = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          apiKey,
          max_tokens: 4000,
          messages: [{
            role: 'user',
            content: [
              contentBlock,
              { type: 'text', text: `Du er statistikekspert. Læs denne opgave og besvar ALLE delspørgsmål kort og direkte på dansk.

For hvert delspørgsmål (a, b, c, d... eller 1, 2, 3...) giv kun det endelige svar — ingen lange forklaringer, ingen udregninger. Bare svaret.

Format:
a) [svar]
b) [svar]
osv.` }
            ]
          }]
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'API fejl');

      const rawAnswer = data.content.map(b => b.text || '').join('\n').trim();

      // Parse svar
      parsedQA = [];
      const lines = rawAnswer.split('\n').filter(l => l.trim().length > 0);
      const answerPattern = /^([a-zA-Z]\)|[a-zA-Z]\.|Opgave \d+|Spørgsmål \d+|\d+[\.\)])/;
      let current = null;
      for (const line of lines) {
        if (answerPattern.test(line.trim())) {
          if (current) parsedQA.push(current);
          current = { q: line.trim().match(answerPattern)[0], a: line.trim().replace(answerPattern, '').trim() };
        } else if (current) {
          current.a += '\n' + line.trim();
        }
      }
      if (current) parsedQA.push(current);
      if (parsedQA.length === 0) parsedQA = [{ q: '', a: rawAnswer }];

      renderResult();
      generatePDF();
      statusEl.style.display = 'none';
      resultBox.style.display = 'block';
      solveBtn.disabled = false;

    } catch (err) {
      statusEl.style.display = 'none';
      showError(err.message || 'Ukendt fejl.');
      solveBtn.disabled = false;
    }
  });

  function renderResult() {
    resultBody.innerHTML = '';
    parsedQA.forEach((qa, i) => {
      const block = document.createElement('div');
      block.className = 'q-block';
      block.innerHTML = `
        ${qa.q ? `<div class="q-num">${qa.q}</div>` : ''}
        <div class="a-text">${esc(qa.a)}</div>
        ${i < parsedQA.length - 1 ? '<hr class="divider">' : ''}
      `;
      resultBody.appendChild(block);
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const margin = 20, pageW = 210, pageH = 297, contentW = pageW - margin * 2;
    let y = margin;

    function checkPage(n) { if (y + n > pageH - margin) { doc.addPage(); y = margin; } }

    doc.setFontSize(14); doc.setFont('helvetica', 'bold'); doc.setTextColor(50,50,50);
    doc.text('Besvarelse', margin, y); y += 10;
    doc.setDrawColor(200,200,200); doc.setLineWidth(0.3); doc.line(margin, y, pageW-margin, y); y += 8;

    parsedQA.forEach((qa, i) => {
      if (qa.q) {
        checkPage(8);
        doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.setTextColor(80,80,80);
        doc.text(qa.q, margin, y); y += 6;
      }
      const aLines = doc.splitTextToSize(qa.a, contentW);
      aLines.forEach(line => {
        checkPage(5);
        doc.setFontSize(10); doc.setFont('helvetica', 'normal'); doc.setTextColor(30,30,30);
        doc.text(line, margin, y); y += 5;
      });
      y += 4;
      if (i < parsedQA.length - 1) {
        checkPage(4);
        doc.setDrawColor(220,220,220); doc.line(margin, y, pageW-margin, y); y += 6;
      }
    });

    const total = doc.internal.getNumberOfPages();
    for (let p = 1; p <= total; p++) {
      doc.setPage(p); doc.setFontSize(8); doc.setTextColor(180,180,180);
      doc.text(`${p} / ${total}`, pageW-margin, pageH-10, { align: 'right' });
    }
    doc.save('besvarelse.pdf');
  }

  dlBtn.addEventListener('click', generatePDF);

  function showError(msg) {
    errorBox.textContent = '⚠️ ' + msg;
    errorBox.style.display = 'block';
  }
</script>
</body>
</html>
